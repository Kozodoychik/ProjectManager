{% extends "base.html" %}

{% block title %}Параметры{% endblock title %}
{% block page_title %}Параметры{% endblock page_title %}

{% block content %}
<section>
	<form action="/params/" method="POST">
		{% csrf_token %}
		{% for field in form %}
		<div class="form-field">
			<label for="{{ field.name }}"><span>{{ field.label }}</span></label>
			<input class="form-input-text" id="{{ field.name }}" name="{{ field.name }}" type="text" value="{{ field.value }}" required />
		</div>
		{% endfor %}

		<div class="form-btns">
			<input class="btn" type="submit" value="Ок"/>
			<button class="btn cancel-btn" onclick="page_reload(event)">Отмена</button>
		</div>
	</form>
</section>
{% endblock content %}
